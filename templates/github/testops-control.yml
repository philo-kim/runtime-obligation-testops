name: testops-control

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-testops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx rotops validate
